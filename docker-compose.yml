services:
  # Backend API Service
  backend:
    container_name: file_upload_backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-rootpassword}
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DB=${MYSQL_DB:-files_db}
    volumes:
      - ./:/app
    networks:
      - file-upload-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('127.0.0.1',8000))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  # Frontend Service (Streamlit)
  frontend:
    container_name: file_upload_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_ENABLECORS=false
      - STREAMLIT_SERVER_ENABLEXSRFPROTECTION=false
      - STREAMLIT_CLIENT_SHOWSTDERR=true
      - STREAMLIT_LOGGER_LEVEL=error
      - BACKEND_API_URL=http://backend:8000
    volumes:
      - ./frontend.py:/app/frontend.py
    networks:
      - file-upload-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8501), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Cloudflare Tunnel Service
  cloudflare-tunnel:
    container_name: file_upload_tunnel
    image: cloudflare/cloudflared:latest
    # Enable verbose logging to help debug origin connection issues
    # Note: --loglevel is a global flag and must be placed before the 'run' subcommand
    command: tunnel --no-autoupdate --loglevel debug run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - file-upload-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # MySQL Database Service
  db:
    container_name: file_upload_db
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-files_db}
    ports:
      - "3306:3306"
    networks:
      - file-upload-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  file-upload-network:
    driver: bridge

volumes:
  database:
    driver: local
